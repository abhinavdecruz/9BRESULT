<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMMHS Karavaloor | Result Portal</title>
    <style>
        :root {
            --primary: #1a2a6c;
            --secondary: #b21f1f;
            --accent: #fdbb2d;
            --glass: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--glass);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            transition: all 0.3s ease;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin: 0; color: var(--primary); font-size: 24px; }
        .header p { color: #666; font-size: 14px; margin-top: 5px; }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--accent); outline: none; }

        button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }
        button:hover { background: #0f1a4a; transform: translateY(-2px); }

        #resultArea { margin-top: 30px; display: none; animation: fadeIn 0.5s; }
        
        .result-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .result-table th, .result-table td { 
            padding: 12px; border: 1px solid #eee; text-align: left; 
        }
        .result-table th { background: #f8f9fa; }

        .grade-pill {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            background: #eee;
        }

        .error { color: #b21f1f; text-align: center; font-weight: bold; display: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    </div>

    <div id="loginForm">
        <div class="input-group">

        <div class="input-group">
            <label>Date of Birth</label>
            <input type="text" id="dob" placeholder="DD/MM/YYYY">
        </div>
        <button onclick="checkResult()">Check Result</button>
        <p id="errorMsg" class="error">Invalid Roll Number or Date of Birth!</p>
    </div>

    <div id="resultArea">
        <h2 id="studentName" style="color: var(--primary); text-align: center; margin-bottom: 5px;"></h2>
        <p id="studentRoll" style="text-align: center; margin-top: 0; color: #777;"></p>
        
        <table class="result-table">
            <thead>
                <tr><th>Subject</th><th>Grade</th></tr>
            </thead>
            <tbody id="gradeRows"></tbody>
        </table>
        <button style="margin-top: 20px; background: #666;" onclick="location.reload()">Back</button>
    </div>

    function checkResult() {
        const roll = parseInt(document.getElementById('rollNo').value);

            const student = rawData[roll - 1];

                showResult(student, roll);
                error.style.display = 'none';
                return;
            }
        }
        error.style.display = 'block';
    }

    function showResult(student, roll) {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('studentName').innerText = student.n;
        document.getElementById('studentRoll').innerText = "Roll No: " + roll;
