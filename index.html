<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMMHS Karavaloor | Official Result Portal</title>
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #1e293b;
            --accent: #38bdf8;
            --success: #22c55e;
            --glass: rgba(255, 255, 255, 0.98);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            color: #f8fafc;
        }

        .card {
            background: var(--glass);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            color: #1e293b;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, var(--accent), var(--success));
        }

        .header { text-align: center; margin-bottom: 32px; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; color: var(--primary); }
        .header p { color: #64748b; font-size: 14px; margin-top: 8px; font-weight: 500; }

        .input-group { margin-bottom: 24px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 700; color: #475569; text-transform: uppercase; }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.2s;
            background: #f8fafc;
        }
        input:focus { border-color: var(--accent); outline: none; background: white; box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1); }

        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background: #1e293b; transform: translateY(-1px); }

        #resultArea { display: none; animation: slideUp 0.4s ease-out; }
        
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .subject-name { font-weight: 500; color: #475569; }
        .grade-val { font-weight: 800; color: var(--primary); }

        .error { color: #ef4444; text-align: center; font-size: 14px; font-weight: 600; margin-top: 16px; display: none; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">

        <div class="input-group">

        <div class="input-group">

        <button onclick="checkResult()">Access Report Card</button>

    <div id="resultArea">

        <div id="gradeList"></div>
        <button style="margin-top: 24px; background: #f1f5f9; color: #475569;" onclick="location.reload()">Exit Portal</button>
    </div>
</div>

    function checkResult() {
        const roll = parseInt(document.getElementById('rollNo').value);

        if (roll >= 1 && roll <= students.length) {
            const student = students[roll - 1];
            if (student.d === dobInput) {
                showResult(student, roll);
                error.style.display = 'none';
                return;
            }
        }
        error.style.display = 'block';
    }

    function showResult(student, roll) {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('studentName').innerText = student.n;
