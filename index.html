<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMMHS Karavaloor - Grade Portal</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 20px;
        }

        h1 { color: var(--primary-color); margin: 0; }
        p { color: #666; }

        .controls {
            display: flex;
            justify-content:间;
            margin-bottom: 20px;
            gap: 10px;
        }

        #searchInput {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            padding: 15px;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        tr:hover { background-color: #f1f7ff; }

        /* Color Coding for Grades */
        .grade-aplus { color: #2ecc71; font-weight: bold; }
        .grade-a { color: #27ae60; font-weight: bold; }
        .grade-fail { color: #e74c3c; font-weight: bold; }

        @media (max-width: 600px) {
            .container { padding: 10px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>

    </header>

        <input type="text" id="searchInput" placeholder="🔍 Search student name..." onkeyup="filterTable()">
    </div>

    <div class="table-wrapper">

            <tbody id="tableBody">

    </div>
</div>

    function renderTable(data) {
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        data.forEach(item => {
            const row = document.createElement('tr');
            let gradeCells = item.g.map(grade => {
                let cls = '';
                if(grade === 'A+') cls = 'grade-aplus';
                else if(grade === 'A') cls = 'grade-a';
                else if(grade.includes('D')) cls = 'grade-fail';
                return `<td class="${cls}">${grade}</td>`;
            }).join('');
            
            row.innerHTML = `<td><strong>${item.n}</strong></td>${gradeCells}`;
            body.appendChild(row);
        });
    }

    function filterTable() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = students.filter(s => s.n.toLowerCase().includes(query));
        renderTable(filtered);
    }

    // Initial load
    renderTable(students);
